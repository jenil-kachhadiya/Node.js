<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="contact.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        body {
            background: #f4f7fb;
        }

        .container {
            width: 90%;
            max-width: 900px;
            margin: auto;
        }

        .contact {
            padding: 60px 0;
        }

        .contact h2 {
            text-align: center;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #777;
            margin-bottom: 30px;
        }

        .contact-box {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        .contact-form {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
        }

        .contact-form input,
        .contact-form textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }

        .contact-form textarea {
            height: 120px;
            resize: none;
        }

        .contact-form button {
            width: 100%;
            padding: 12px;
            border: none;
            background: #0099ff;
            color: #fff;
            border-radius: 6px;
            cursor: pointer;
        }

        .contact-info {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
        }

        .contact-info h3 {
            margin-bottom: 10px;
        }

        .contact-info p {
            margin-bottom: 8px;
            color: #555;
        }

        @media (max-width: 768px) {
            .contact-box {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <section class="contact">
        <div class="container">

            <h2>Contact Us</h2>
            <p class="subtitle">We’d love to hear from you</p>

            <div class="contact-box">

                <form class="contact-form">
                    <input type="text" placeholder="Full Name">
                    <input type="email" placeholder="Email">
                    <input type="text" placeholder="Phone">
                    <textarea placeholder="Your Message"></textarea>
                    <button type="submit">Send Message</button>
                </form>

                <div class="contact-info">
                    <h3>Our Details</h3>
                    <p>Email: laundry@mail.com</p>
                    <p>Phone: +91 98765 43210</p>
                    <p>Address: Ahmedabad, Gujarat</p>
                </div>

            </div>
        </div>
    </section>
</body>

</html>
