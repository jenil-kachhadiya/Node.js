<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    <style>
        .hero {
            display: grid;
            grid-template-columns: 1fr 1fr;
            align-items: center;
            padding: 60px 80px;
            gap: 40px;
            background: #fff;
        }

        .hero-left h1 {
            font-size: 2.9rem;
            margin-bottom: 15px;
        }

        .blue-text {
            color: #0099ff;
        }

        .hero-left p {
            color: #666;
            margin-bottom: 25px;
        }

        .hero-left .button {
            background: #0099ff;
            color: #fff;
            padding: 14px 28px;
            border-radius: 10px;
            text-decoration: none;
        }

        .hero-right img {
            width: 100%;
            max-width: 420px;
        }
    </style>
</head>

<body>
    <section class="hero" id="home">
        <div class="hero-left">
            <h1>Revitalize Your <br>Clothes with Expert <br> <span class="blue-text">Laundry Services!</span> </h1>
            <p>From premium dry cleaning to swift wash and fold, we deliver care and convenience. Schedule a pickup and
                rediscover the freshness of your clothes today!</p> <!-- <button >Book a service today!</button> -->
            <a href="#service" class="button">Book a service today!</a>
        </div>

        <div class="hero-right"> <img src="https://img.freepik.com/premium-vector/cartoon-vector-illustration-washing-clothes-process-isolated-design-laundry-service-promotion_1138840-10014.jpg"
             alt="Laundry Image" width="500" height="320"> </div>
    </section>
</body>

</html>
